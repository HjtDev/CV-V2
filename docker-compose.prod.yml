# Production — Gunicorn + Next.js standalone, named volumes, no bind mounts
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#        cp .env.prod.example .env.prod   (first time, fill in real values)

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resume_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resume_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # ── Django Backend (Gunicorn) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: backend,localhost,127.0.0.1,${DOMAIN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL},http://localhost:${FRONTEND_PORT:-3000}
      CSRF_TRUSTED_ORIGINS: ${FRONTEND_URL},http://localhost:${FRONTEND_PORT:-3000}
      # nginx terminates SSL; Django must not redirect internal HTTP traffic to HTTPS
      SECURE_SSL_REDIRECT: "False"
    depends_on:
      - postgres
      - redis
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_logs:/app/logs
    networks:
      - app_network

  # ── Next.js Frontend (standalone) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    container_name: resume_frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  backend_logs:
