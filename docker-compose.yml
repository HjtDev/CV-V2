# Development — hot reload, bind-mounted source, Django runserver + Next.js dev
# Usage: docker compose up --build
#        cp .env.example .env   (first time)

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # ── Django Backend (runserver) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./backend:/app                 # bind mount — changes reflect instantly
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
      ALLOWED_HOSTS: backend,localhost,127.0.0.1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      CSRF_TRUSTED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - app_network

  # ── Next.js Frontend (npm run dev) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./:/app                        # bind mount — changes reflect instantly
      - /app/node_modules              # isolate container node_modules from host
      - /app/.next                     # isolate Next.js build cache
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}
      NEXT_PUBLIC_SITE_URL: http://localhost:${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-http://localhost:3001/script.js}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      WATCHPACK_POLLING: "true"        # reliable HMR inside Docker on Linux
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network

  # ── Umami Analytics DB ───────────────────────────────────────────────────────
  umami_db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_dev_password}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Umami Analytics ──────────────────────────────────────────────────────────
  umami:
    image: umamisoftware/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_dev_password}@umami_db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-umami-dev-secret}
    depends_on:
      umami_db:
        condition: service_healthy
    ports:
      - "${UMAMI_PORT:-3001}:3000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  umami_db_data:
