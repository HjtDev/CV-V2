services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-before-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: backend,localhost,127.0.0.1,${DOMAIN:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-portfolio_user}:${POSTGRES_PASSWORD:-portfolio_password}@postgres:5432/${POSTGRES_DB:-portfolio_db}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},${FRONTEND_URL:-}
      CSRF_TRUSTED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},${FRONTEND_URL:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_logs:/app/logs
    networks:
      - app_network

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Server-side fetch target (container-to-container, internal network)
        API_URL: http://backend:8000
        # Client-side fetch target (browser → published backend port)
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  backend_logs:
